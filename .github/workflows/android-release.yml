name: Build Android Release (AAB)

# Buduje PODPISANY App Bundle (.aab) gotowy do wgrania w Google Play.
# Wyzwalany ręcznie (workflow_dispatch) lub po wypchnięciu tagu v* (np. v2.0.0).
#
# Wymagane sekrety repozytorium (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   - keystore zakodowany w base64
#   ANDROID_KEYSTORE_PASSWORD - hasło keystore
#   ANDROID_KEY_ALIAS         - alias klucza (refrigerationcalc)
#   ANDROID_KEY_PASSWORD      - hasło klucza (zwykle takie samo jak hasło keystore)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-release:
    name: Buildozer (signed release AAB)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev \
            automake ccache python3-pip

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Buildozer build dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-build-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-build-${{ runner.os }}-

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install buildozer==1.5.0 cython==0.29.36

      - name: Purge stale python-for-android cache
        run: |
          rm -rf ~/.buildozer/android/platform/python-for-android* || true
          rm -rf .buildozer/android/platform/python-for-android* || true
          rm -rf .buildozer/android/platform/build-* || true

      - name: Run unit tests (core)
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pytest tests/ -q

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo -e "\n504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          echo -e "\n859f317696f67ef3d7f30a50a5560e7834b43903" > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.buildozer/android/platform/android-sdk/licenses/google-android-sdk-arm-dbt-license

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Brak sekretu ANDROID_KEYSTORE_BASE64. Dodaj go w Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$HOME/release.keystore"
          echo "Keystore zdekodowany ($(stat -c%s "$HOME/release.keystore") B)."

      - name: Set numeric version code from run number
        run: |
          # Google Play wymaga rosnącego versionCode dla każdej publikacji.
          sed -i "s/^android.numeric_version = .*/android.numeric_version = ${{ github.run_number }}/" buildozer.spec
          grep "^android.numeric_version" buildozer.spec

      - name: Build signed release AAB
        env:
          P4A_RELEASE_KEYSTORE: /home/runner/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eo pipefail
          ( yes || true ) | buildozer android release 2>&1 | tee buildozer.log

      - name: Upload buildozer log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-release-log
          path: buildozer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refrigerationcalc-release-aab
          path: bin/*.aab
          if-no-files-found: warn
          retention-days: 30
