name: Build Android Release (AAB)

# Buduje PODPISANY App Bundle (.aab) gotowy do wgrania w Google Play.
# Wyzwalany ręcznie (workflow_dispatch) lub po wypchnięciu tagu v* (np. v2.0.0).
#
# Wymagane sekrety repozytorium (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   - keystore zakodowany w base64
#   ANDROID_KEYSTORE_PASSWORD - hasło keystore
#   ANDROID_KEY_ALIAS         - alias klucza (refrigerationcalc)
#   ANDROID_KEY_PASSWORD      - hasło klucza (zwykle takie samo jak hasło keystore)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-release:
    name: Buildozer (signed release AAB)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure Firebase SDK (optional)
        env:
          FIREBASE_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" ]; then
            mkdir -p .firebase
            echo "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > .firebase/google-services.json
            echo "FIREBASE_GOOGLE_SERVICES_JSON=$GITHUB_WORKSPACE/.firebase/google-services.json" >> "$GITHUB_ENV"
            echo "Firebase Android configuration enabled."
          else
            echo "::notice::Firebase configuration secret is not set; telemetry will remain disabled."
          fi

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        timeout-minutes: 12
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y --no-install-recommends \
            build-essential git zip unzip \
            autoconf libtool libtool-bin libltdl-dev m4 pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext ccache python3-pip python3-virtualenv

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain 1.96.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Buildozer global dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Buildozer build dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .buildozer
          key: buildozer-build-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-build-${{ runner.os }}-

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip==26.1.2 wheel==0.47.0 setuptools==82.0.1
          python -m pip install buildozer==1.6.0 legacy-cgi==2.6.4
          python -m pip install --force-reinstall --no-deps cython==3.0.11

      - name: Purge stale python-for-android cache
        run: |
          rm -rf ~/.buildozer/android/platform/python-for-android* || true
          rm -rf .buildozer/android/platform/python-for-android* || true
          rm -rf .buildozer/android/platform/build-* || true
          # Usun ewentualne host-arch (x86_64) .so fonttools z przywroconego cache,
          # zeby nie trafily do bundla arm64 (dlopen EM_X86_64 vs EM_AARCH64).
          find ~/.buildozer .buildozer -type f -path '*fontTools*' -name '*.so' -delete 2>/dev/null || true
          find ~/.buildozer .buildozer -type f -path '*fonttools*' -name '*.so' -delete 2>/dev/null || true

      - name: Run unit tests (core)
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pytest tests/ -q

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo -e "\n504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          echo -e "\n859f317696f67ef3d7f30a50a5560e7834b43903" > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.buildozer/android/platform/android-sdk/licenses/google-android-sdk-arm-dbt-license

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::Brak sekretu ANDROID_KEYSTORE_BASE64. Dodaj go w Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$HOME/release.keystore"
          echo "Keystore zdekodowany ($(stat -c%s "$HOME/release.keystore") B)."

      - name: Set numeric version code from run number
        run: |
          # Google Play wymaga rosnącego versionCode dla każdej publikacji.
          sed -i "s/^android.numeric_version = .*/android.numeric_version = ${{ github.run_number }}/" buildozer.spec
          grep "^android.numeric_version" buildozer.spec

      - name: Build signed release AAB
        env:
          P4A_RELEASE_KEYSTORE: /home/runner/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eo pipefail
          export LDFLAGS="${LDFLAGS:-} -Wl,-z,max-page-size=16384"
          export APP_LDFLAGS="${APP_LDFLAGS:-} -Wl,-z,max-page-size=16384"
          export CFLAGS="${CFLAGS:-} -Dban_ALooper_pollAll=ALooper_pollOnce -Wno-error -Wno-cast-function-type-strict -Wno-cast-function-type"
          export CXXFLAGS="${CXXFLAGS:-} -Wno-error -Wno-cast-function-type-strict -Wno-cast-function-type"
          echo "LDFLAGS=$LDFLAGS"
          echo "APP_LDFLAGS=$APP_LDFLAGS"
          echo "CFLAGS=$CFLAGS"
          echo "CXXFLAGS=$CXXFLAGS"
          ( yes || true ) | buildozer android release 2>&1 | tee buildozer.log

      - name: Collect Play Console diagnostic files
        if: always()
        run: |
          set -eo pipefail
          python - <<'PY'
          import shutil
          import subprocess
          import zipfile
          from pathlib import Path

          out = Path("play-console-diagnostics")
          out.mkdir(exist_ok=True)

          aabs = sorted(Path("bin").glob("*.aab"))
          app_lib_names = set()
          if aabs:
              with zipfile.ZipFile(aabs[0]) as bundle:
                  app_lib_names = {
                      Path(name).name
                      for name in bundle.namelist()
                      if name.startswith("base/lib/") and name.endswith(".so")
                  }

          roots = [Path(".buildozer"), Path.home() / ".buildozer"]
          targets = {
              "native-debug-symbols.zip": [
                  "**/outputs/native-debug-symbols/**/native-debug-symbols.zip",
                  "**/native-debug-symbols.zip",
              ],
              "mapping.txt": [
                  "**/outputs/mapping/**/mapping.txt",
              ],
          }

          found = {}
          for dest_name, patterns in targets.items():
              for root in roots:
                  if not root.exists():
                      continue
                  for pattern in patterns:
                      matches = sorted(root.glob(pattern))
                      if matches:
                          src = matches[0]
                          shutil.copy2(src, out / dest_name)
                          found[dest_name] = str(src)
                          break
                  if dest_name in found:
                      break

          def has_native_symbols(path):
              try:
                  result = subprocess.run(
                      ["readelf", "-S", str(path)],
                      check=False,
                      capture_output=True,
                      text=True,
                      timeout=20,
                  )
              except (OSError, subprocess.SubprocessError):
                  return False
              return ".symtab" in result.stdout or ".debug_" in result.stdout

          if "native-debug-symbols.zip" not in found:
              candidates = {}
              for root in roots:
                  if not root.exists():
                      continue
                  for so in root.glob("**/*.so"):
                      path_text = so.as_posix()
                      path_lower = path_text.lower()
                      if app_lib_names and so.name not in app_lib_names:
                          continue
                      if "/outputs/" in path_text:
                          continue
                      if "/android-ndk-" in path_lower or "/android-sdk/" in path_lower:
                          continue
                      if "/.gradle/caches/" in path_lower:
                          continue
                      if "/fontTools/" in path_text or "/fonttools/" in path_text:
                          continue
                      if not has_native_symbols(so):
                          continue
                      score = 0
                      if "/build/intermediates/" in path_text:
                          score += 50
                      if "/build/other_builds/" in path_text:
                          score += 30
                      if "/build/bootstrap_builds/" in path_text:
                          score += 20
                      if "/dists/" in path_text:
                          score += 10
                      current = candidates.get(so.name)
                      if current is None or score > current[0]:
                          candidates[so.name] = (score, so)

              if candidates:
                  symbol_zip = out / "native-debug-symbols.zip"
                  with zipfile.ZipFile(symbol_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                      for name, (_score, so) in sorted(candidates.items()):
                          zf.write(so, f"lib/arm64-v8a/{name}")
                  found["native-debug-symbols.zip"] = (
                      f"generated manually from {len(candidates)} app .so files"
                  )
              elif app_lib_names and aabs:
                  symbol_zip = out / "native-debug-symbols.zip"
                  with zipfile.ZipFile(symbol_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                      with zipfile.ZipFile(aabs[0]) as bundle:
                          for name in sorted(bundle.namelist()):
                              if name.startswith("base/lib/") and name.endswith(".so"):
                                  zf.writestr(f"lib/arm64-v8a/{Path(name).name}", bundle.read(name))
                  found["native-debug-symbols.zip"] = (
                      f"generated fallback from {len(app_lib_names)} packaged AAB .so files"
                  )

          notes = [
              "Play Console diagnostic files",
              "=============================",
              "",
              "native-debug-symbols.zip: "
              + found.get("native-debug-symbols.zip", "not generated separately"),
              f"AAB native library names: {len(app_lib_names)}",
              "mapping.txt: "
              + found.get("mapping.txt", "not generated because release is not R8-obfuscated"),
              "",
              "For AAB releases, native symbols may also be embedded in the bundle when",
              "android.buildTypes.release.ndk.debugSymbolLevel is set to SYMBOL_TABLE.",
          ]
          (out / "README.txt").write_text("\n".join(notes) + "\n", encoding="utf-8")
          print("\n".join(notes))
          PY

      - name: Check native libraries 16 KB alignment
        if: always()
        run: |
          set -eo pipefail
          python - <<'PY'
          import struct
          import zipfile
          from pathlib import Path

          report = Path("native-libs-16kb-report.txt")
          aabs = sorted(Path("bin").glob("*.aab"))
          lines = [
              "16 KB native library alignment report",
              "====================================",
              f"AAB: {aabs[0] if aabs else 'not found'}",
              "",
          ]
          if not aabs:
              lines.append("No AAB produced; skipping native library inspection.")
              report.write_text("\n".join(lines) + "\n", encoding="utf-8")
              raise SystemExit(0)

          def load_alignments(data):
              if data[:4] != b"\x7fELF":
                  return []
              elf_class = data[4]
              endian = data[5]
              prefix = "<" if endian == 1 else ">"
              if elf_class == 2:
                  e_phoff = struct.unpack_from(prefix + "Q", data, 32)[0]
                  e_phentsize = struct.unpack_from(prefix + "H", data, 54)[0]
                  e_phnum = struct.unpack_from(prefix + "H", data, 56)[0]
                  fmt = prefix + "IIQQQQQQ"
              else:
                  e_phoff = struct.unpack_from(prefix + "I", data, 28)[0]
                  e_phentsize = struct.unpack_from(prefix + "H", data, 42)[0]
                  e_phnum = struct.unpack_from(prefix + "H", data, 44)[0]
                  fmt = prefix + "IIIIIIII"
              aligns = []
              for i in range(e_phnum):
                  off = e_phoff + i * e_phentsize
                  ph = struct.unpack_from(fmt, data, off)
                  if ph[0] == 1:
                      aligns.append(ph[-1])
              return aligns

          bad = []
          count = 0
          native_debug_entries = []
          with zipfile.ZipFile(aabs[0]) as bundle:
              native_debug_entries = sorted(
                  name for name in bundle.namelist()
                  if "debugsymbols" in name.lower()
                  or "native-debug-symbols" in name.lower()
              )
              for name in sorted(n for n in bundle.namelist() if n.endswith(".so")):
                  count += 1
                  aligns = sorted(set(load_alignments(bundle.read(name))))
                  align_text = " ".join(hex(a) for a in aligns) or "none"
                  lines.append(f"{name}: {align_text}")
                  if any(a == 0x1000 or a == 4096 for a in aligns):
                      bad.append((name, align_text))

          lines.append("")
          lines.append(f"Native libraries inspected: {count}")
          if bad:
              lines.append("WARNING: 4 KB LOAD alignment detected:")
              for name, align_text in bad:
                  lines.append(f"- {name}: {align_text}")
              print("::warning::Some native libraries still have 4 KB LOAD alignment. See native-libs-16kb-report.txt.")
          else:
              lines.append("No 4 KB LOAD alignment found in inspected native libraries.")
          lines.append("")
          lines.append(f"Native debug metadata entries in AAB: {len(native_debug_entries)}")
          for name in native_debug_entries[:20]:
              lines.append(f"- {name}")
          report.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Sanitize buildozer log (on failure)
        if: failure()
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          path = Path("buildozer.log")
          if not path.exists():
              raise SystemExit(0)
          text = path.read_text(encoding="utf-8", errors="replace")
          for name in ("STORE_PASSWORD", "KEY_PASSWORD", "KEY_ALIAS"):
              value = os.environ.get(name, "")
              if value:
                  text = text.replace(value, "***")
          path.write_text(text, encoding="utf-8")
          print("Sanitized buildozer.log before artifact upload.")
          PY

      - name: Generate package size report
        if: always()
        run: |
          AAB_PATH="$(find bin -maxdepth 1 -name '*.aab' -print -quit)"
          if [ -n "$AAB_PATH" ]; then
            python tools/android_size_report.py "$AAB_PATH" --output package-size-report.txt
          fi

      - name: Upload package size report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aab-size-report
          path: package-size-report.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload sanitized buildozer log (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: buildozer-release-log
          path: buildozer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload 16 KB alignment report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-libs-16kb-report
          path: native-libs-16kb-report.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload Play Console diagnostic files
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: play-console-diagnostics
          path: play-console-diagnostics/*
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: refrigerationcalc-release-aab
          path: bin/*.aab
          if-no-files-found: warn
          retention-days: 30
