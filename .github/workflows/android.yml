name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Buildozer (debug APK)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev cmake libffi-dev libssl-dev \
            automake ccache python3-pip

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Buildozer build dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-build-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-build-${{ runner.os }}-

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install buildozer==1.5.0 cython==0.29.36

      - name: Run unit tests (core)
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pytest tests/ -q

      - name: Build debug APK
        run: |
          set -e
          buildozer android debug 2>&1 | tee buildozer.log

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shockercalc-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
