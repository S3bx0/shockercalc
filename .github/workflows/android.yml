name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      distribute_to_firebase:
        description: Send the APK to Firebase App Distribution
        required: false
        type: boolean
        default: false
      release_notes:
        description: Optional notes shown to Firebase testers
        required: false
        type: string

jobs:
  build-apk:
    name: Buildozer (debug APK)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure Firebase SDK (optional)
        env:
          FIREBASE_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -n "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" ]; then
            mkdir -p .firebase
            echo "$FIREBASE_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > .firebase/google-services.json
            echo "FIREBASE_GOOGLE_SERVICES_JSON=$GITHUB_WORKSPACE/.firebase/google-services.json" >> "$GITHUB_ENV"
            echo "Firebase Android configuration enabled."
          else
            echo "::notice::Firebase configuration secret is not set; telemetry will remain disabled."
          fi

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system deps
        timeout-minutes: 12
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30 install -y --no-install-recommends \
            build-essential git zip unzip \
            autoconf libtool libtool-bin libltdl-dev m4 pkg-config zlib1g-dev libncurses-dev \
            libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
            automake autopoint gettext ccache python3-pip python3-virtualenv

      - name: Install Rust toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal --default-toolchain 1.96.0
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Buildozer global dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Buildozer build dir
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .buildozer
          key: buildozer-build-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-build-${{ runner.os }}-

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip==26.1.2 wheel==0.47.0 setuptools==82.0.1
          python -m pip install buildozer==1.6.0 legacy-cgi==2.6.4
          python -m pip install --force-reinstall --no-deps cython==3.0.11

      - name: Purge stale python-for-android cache
        run: |
          rm -rf ~/.buildozer/android/platform/python-for-android* || true
          rm -rf .buildozer/android/platform/python-for-android* || true
          rm -rf .buildozer/android/platform/build-* || true

      - name: Run unit tests (core)
        run: |
          python -m pip install -r requirements.txt -r requirements-dev.txt
          python -m pytest tests/ -q

      - name: Pre-accept Android SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          # Hashe licencji Android SDK (oficjalne, publiczne)
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
          echo -e "\n504667f4c0de7af1a06de9f4b1727b84351f2910" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license
          echo -e "\n859f317696f67ef3d7f30a50a5560e7834b43903" > ~/.buildozer/android/platform/android-sdk/licenses/google-gdk-license
          echo -e "\n33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > ~/.buildozer/android/platform/android-sdk/licenses/google-android-sdk-arm-dbt-license

      - name: Build debug APK
        env:
          # APK packaging compresses the bundled Python runtime in memory. The
          # Gradle default heap is too small for this project on GitHub runners.
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.workers.max=1"
        run: |
          set -o pipefail
          export LDFLAGS="${LDFLAGS:-} -Wl,-z,max-page-size=16384"
          export APP_LDFLAGS="${APP_LDFLAGS:-} -Wl,-z,max-page-size=16384"
          export CFLAGS="${CFLAGS:-} -Dban_ALooper_pollAll=ALooper_pollOnce -Wno-error -Wno-cast-function-type-strict -Wno-cast-function-type"
          export CXXFLAGS="${CXXFLAGS:-} -Wno-error -Wno-cast-function-type-strict -Wno-cast-function-type"
          # `yes` ko\u0144czy si\u0119 SIGPIPE (141) gdy buildozer si\u0119 zamknie \u2014 nie jest to b\u0142\u0105d builda.
          # Akceptujemy exit code 0 lub 141; reszta = realny b\u0142\u0105d.
          set +e
          ( yes || true ) | buildozer android debug 2>&1 | tee buildozer.log
          build_status=${PIPESTATUS[1]}
          set -e

          if [ "$build_status" -ne 0 ]; then
            echo "::warning::Buildozer failed; retrying the generated Gradle project with a full stack trace."
            DIST_GRADLEW="$(find .buildozer -type f -path '*/dists/*/gradlew' -print -quit)"
            if [ -z "$DIST_GRADLEW" ]; then
              echo "::error::Generated Gradle wrapper was not found."
              exit "$build_status"
            fi
            DIST_DIR="$(dirname "$DIST_GRADLEW")"
            chmod +x "$DIST_GRADLEW"
            (
              cd "$DIST_DIR"
              ./gradlew clean assembleDebug --stacktrace --no-daemon 2>&1
            ) | tee -a "$GITHUB_WORKSPACE/buildozer.log"

            APK_PATH="$(find "$DIST_DIR/build/outputs/apk/debug" -name '*.apk' -print -quit)"
            if [ -z "$APK_PATH" ]; then
              echo "::error::Gradle completed but no debug APK was found."
              exit 1
            fi
            mkdir -p bin
            cp "$APK_PATH" bin/refrigerationcalc-debug.apk
          fi

      - name: Upload buildozer log (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: buildozer-log
          path: buildozer.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Generate package size report
        if: always()
        run: |
          APK_PATH="$(find bin -maxdepth 1 -name '*.apk' -print -quit)"
          if [ -n "$APK_PATH" ]; then
            python tools/android_size_report.py "$APK_PATH" --output package-size-report.txt
          fi

      - name: Upload package size report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apk-size-report
          path: package-size-report.txt
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: refrigerationcalc-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Distribute APK with Firebase App Distribution
        if: github.event_name == 'workflow_dispatch' && inputs.distribute_to_firebase
        env:
          FIREBASE_ANDROID_APP_ID: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
          FIREBASE_TESTER_GROUPS: ${{ vars.FIREBASE_TESTER_GROUPS }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [ -z "$FIREBASE_ANDROID_APP_ID" ] || [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" ]; then
            echo "::error::Set FIREBASE_ANDROID_APP_ID and FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 first."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON_BASE64" | base64 -d > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          npm install --global firebase-tools@15.22.0
          APK_PATH="$(find bin -maxdepth 1 -name '*.apk' -print -quit)"
          firebase appdistribution:distribute "$APK_PATH" \
            --app "$FIREBASE_ANDROID_APP_ID" \
            --groups "${FIREBASE_TESTER_GROUPS:-android-testers}" \
            --release-notes "${RELEASE_NOTES:-Automated Refrigeration Calc test build}"
