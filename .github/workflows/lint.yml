name: Lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff + mypy
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install lint tools
        run: python -m pip install ruff==0.15.20 mypy==2.1.0

      - name: Ruff (lint)
        run: python -m ruff check tpof tests

      - name: Mypy (pure modules)
        run: python -m mypy
